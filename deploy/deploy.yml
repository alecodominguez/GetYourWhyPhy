# .github/workflows/deploy.yml
#
# Lets you "modify the server remotely" by pushing to GitHub instead of
# hand-editing files over SSH every time. On every push to main, this
# connects to your VPS, pulls the latest code, reinstalls dependencies if
# requirements.txt changed, and restarts the systemd service.
#
# Setup:
#   1. Add these repo secrets (Settings -> Secrets and variables -> Actions):
#        DEPLOY_HOST      e.g. 203.0.113.42
#        DEPLOY_USER      e.g. whyphy
#        DEPLOY_SSH_KEY   private key for a deploy-only key pair (generate
#                          with `ssh-keygen -t ed25519 -f deploy_key`,
#                          put deploy_key.pub in the server's
#                          ~/.ssh/authorized_keys, paste deploy_key here)
#   2. On the server, give the deploy user passwordless sudo scoped ONLY to
#      restarting the service:
#        echo "whyphy ALL=(ALL) NOPASSWD: /bin/systemctl restart whyphy" \
#          | sudo tee /etc/sudoers.d/whyphy-restart

name: Deploy WhyPhy server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/GetYourWhyPhy
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart whyphy
            sleep 2
            systemctl is-active whyphy
